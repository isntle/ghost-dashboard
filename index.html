<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Ghost Shopper — Executive Report</title>
<meta name="viewport" content="width=1440" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<!-- Tailwind via CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Geist', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
          mono: ['"Geist Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
        },
        colors: {
          ink:        { DEFAULT: '#0E1014', 2: '#2B2F36' },
          muted:      { DEFAULT: '#6B7280', 2: '#9CA3AF' },
          line:       { DEFAULT: '#ECECE6', strong: '#DDDCD3' },
          paper:      { DEFAULT: '#FAFAF7', elev: '#FFFFFF', soft: '#FBFAF4', warm: '#F4F2EB' },
          brand:      { DEFAULT: '#5B3DF5', ink: '#2A1A8E', tint: '#EFEBFF', light: '#B4A2FF' },
          good:       { DEFAULT: '#047857', tint: '#D9F3E6' },
          warn:       { DEFAULT: '#D97706', tint: '#FDF1DC' },
          bad:        { DEFAULT: '#DC2626', tint: '#FEE7E5' },
          sidebar:    { DEFAULT: '#0E1014', ink: '#ECECE6', muted: '#6B7280', line: '#1A1D24', card: '#15181F' },
        },
        boxShadow: {
          card: '0 1px 0 rgba(14,16,20,.04), 0 1px 2px rgba(14,16,20,.04)',
        },
        borderRadius: {
          'md2': '10px',
          'lg2': '14px',
          'xl2': '18px',
        },
      },
    },
  };
</script>

<style>
  html, body { margin: 0; padding: 0; background: #FAFAF7; color: #0E1014; font-family: 'Geist', sans-serif; -webkit-font-smoothing: antialiased; letter-spacing: -0.005em; font-size: 14px; }
  .num { font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; font-feature-settings: "tnum" 1; }

  /* Topbar blur */
  .topbar-glass { backdrop-filter: saturate(1.2) blur(8px); background: rgba(250,250,247,0.85); }

  /* Hero KPI gradient */
  .kpi-hero { background: linear-gradient(155deg, #FFFFFF 0%, #FBFAF4 100%); }

  /* Trial banner gradient */
  .trial-bg {
    background: linear-gradient(90deg, #0E1014 0%, #1B1530 70%, #2A1A8E 100%);
    position: relative; overflow: hidden;
  }
  .trial-bg::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(60% 100% at 80% 50%, rgba(180,162,255,.25), transparent 60%);
    pointer-events: none;
  }

  /* Score meter */
  .score-meter-bg { background: linear-gradient(90deg, #FEE7E5 0%, #FDF1DC 50%, #D9F3E6 100%); }

  /* Protocol bar fills */
  .bar-bad  { background: linear-gradient(90deg, #F87171, #DC2626); }
  .bar-warn { background: linear-gradient(90deg, #F59E0B, #D97706); }
  .bar-good { background: linear-gradient(90deg, #34D399, #047857); }

  /* Brand mark gradient */
  .brand-mark-bg { background: radial-gradient(120% 120% at 0% 0%, #8A74FF 0%, #5B3DF5 55%, #2A1A8E 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,.25), 0 1px 2px rgba(0,0,0,.4); }

  /* CTA bottom strip */
  .cta-strip { background: linear-gradient(95deg, #FBFAF4 0%, #EFEBFF 100%); }

  /* Embed detail bg */
  .embed-bg { background: #FBFAF4; }
  .transcript-fade::after {
    content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
    background: linear-gradient(180deg, transparent, #FBFAF4);
  }

  /* Insights left borders */
  .ins-crit { border-left: 3px solid #DC2626; background: #FFF6F5; }
  .ins-warn { border-left: 3px solid #D97706; background: #FFFBF1; }
  .ins-good { border-left: 3px solid #047857; background: #F2FBF6; }

  /* Tag dashed dividers */
  hr.dash { border: none; border-top: 1px dashed #ECECE6; margin: 10px 0; }

  /* hide tailwind cdn warning */
  .tw-warn { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Shared utilities + icons -->
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>

<!-- Components -->
<script type="text/babel" src="src/Sidebar.jsx"></script>
<script type="text/babel" src="src/Topbar.jsx"></script>
<script type="text/babel" src="src/TrialBanner.jsx"></script>
<script type="text/babel" src="src/PageHead.jsx"></script>
<script type="text/babel" src="src/KpiCards.jsx"></script>
<script type="text/babel" src="src/ProtocolCompliance.jsx"></script>
<script type="text/babel" src="src/AiInsights.jsx"></script>
<script type="text/babel" src="src/ScoreTrend.jsx"></script>
<script type="text/babel" src="src/ChannelBreakdown.jsx"></script>
<script type="text/babel" src="src/AgentRanking.jsx"></script>
<script type="text/babel" src="src/InteractionsTable.jsx"></script>
<script type="text/babel" src="src/DetailPanel.jsx"></script>
<script type="text/babel" src="src/CtaStrip.jsx"></script>

<!-- App entry -->
<script type="text/babel" src="src/App.jsx"></script>
</body>
</html>
